<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>종로구 수영장 지도</title>

  <!-- ✅ 네이버 지도 API v3 (최신: oapi 도메인 + ncpKeyId 파라미터) -->
  <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=tg6az681o1"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }

    #top-bar {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      position: relative;
      z-index: 200;
      flex-wrap: wrap;
    }

    .pool-btn {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 10px 16px;
      border: 1.5px solid #d0d5dd;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      transition: all 0.18s ease;
      min-width: 170px;
      text-align: left;
    }
    .pool-btn:hover { border-color: #1EC800; background: #f3fff0; }
    .pool-btn.active { border-color: #1EC800; background: #1EC800; }
    .pool-btn .tag {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: #888; margin-bottom: 3px;
    }
    .pool-btn.active .tag { color: rgba(255,255,255,0.8); }
    .pool-btn .name { font-size: 13px; font-weight: 700; color: #1a1a1a; line-height: 1.3; }
    .pool-btn.active .name { color: #fff; }
    .pool-btn .addr { font-size: 11px; color: #888; margin-top: 2px; }
    .pool-btn.active .addr { color: rgba(255,255,255,0.75); }

    #map { width: 100%; height: calc(100vh - 80px); }

    .iw-wrap {
      padding: 14px 16px 12px;
      min-width: 230px;
      max-width: 280px;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }
    .iw-title {
      font-size: 14px; font-weight: 700; color: #111;
      margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #eee;
    }
    .iw-row { display: flex; gap: 8px; margin-bottom: 5px; font-size: 12px; line-height: 1.5; }
    .iw-key { color: #888; min-width: 62px; flex-shrink: 0; }
    .iw-val { color: #222; font-weight: 500; }
  </style>
</head>
<body>

  <div id="top-bar">
    <button class="pool-btn" id="btn-Gov_001" onclick="focusPool('Gov_001')">
      <span class="tag">GOV_001</span>
      <span class="name">종로 올림픽기념국민생활관</span>
      <span class="addr">성균관로 91</span>
    </button>
    <button class="pool-btn" id="btn-Gov_002" onclick="focusPool('Gov_002')">
      <span class="tag">GOV_002</span>
      <span class="name">종로구민회관</span>
      <span class="addr">지봉로5길 7-5</span>
    </button>
    <button class="pool-btn" id="btn-Gov_003" onclick="focusPool('Gov_003')">
      <span class="tag">GOV_003</span>
      <span class="name">종로문화체육센터</span>
      <span class="addr">인왕산로1길 21</span>
    </button>
  </div>

  <div id="map"></div>

<script>
var pools = {
  Gov_001: {
    pool_name: '종로 올림픽기념국민생활관',
    address: '서울 종로구 성균관로 91',
    lat: 37.590491, lng: 126.998824,
    pool_length: '25m', lane_count: '6개', depth: '1.2~1.5m',
    price: '성인 6,050원',
    weekday_hours: '15:00~16:50',
    weekend_hours: '토 15:00~16:50 / 일 10:00~14:50',
    kids_pool: '있음', holiday: '1, 3주 일요일',
    indoor_outdoor: '실내', water_type: '해수풀', homepage: 'www.ijongno.co.kr'
  },
  Gov_002: {
    pool_name: '종로구민회관',
    address: '서울 종로구 지봉로5길 7-5',
    lat: 37.5734077, lng: 127.0143151,
    pool_length: '25m', lane_count: '6개', depth: '1.2~1.5m',
    price: '성인 6,050원',
    weekday_hours: '08:00 / 13:00 / 18:00',
    weekend_hours: '토 15:00~16:50 / 일 11:00~16:50',
    kids_pool: '있음', holiday: '1, 3주 일요일', indoor_outdoor: '실내'
  },
  Gov_003: {
    pool_name: '종로문화체육센터',
    address: '서울 종로구 인왕산로1길 21',
    lat: 37.5744017, lng: 126.9646323,
    pool_length: '25m', lane_count: '5개', depth: '1.1~1.3m',
    price: '성인 6,050원',
    weekday_hours: '08:00 / 12:00 / 18:00',
    weekend_hours: '토 15:00~16:50 / 일 10:00~14:50',
    kids_pool: '있음', holiday: '1, 3주 일요일',
    indoor_outdoor: '실내', homepage: 'www.ijongno.co.kr'
  }
};

function makeInfoContent(p) {
  // 다른 정보 없이 수영장 이름만 담은 심플한 HTML 반환
  return '<div class="iw-wrap" style="padding:10px; font-weight:bold; font-size:14px;">' 
         + '🏊 ' + p.pool_name 
         + '</div>';
}

/* 지도 초기화 */
var map = new naver.maps.Map('map', {
  center: new naver.maps.LatLng(37.582, 126.992),
  zoom: 14,
  zoomControl: true,
  zoomControlOptions: { position: naver.maps.Position.TOP_RIGHT }
});

var markers = {};
var infoWindows = {};
var currentKey = null;

Object.keys(pools).forEach(function(key) {
  var p = pools[key];

  /* 마커 */
  var marker = new naver.maps.Marker({
    position: new naver.maps.LatLng(p.lat, p.lng),
    map: map,
    title: p.pool_name,
    animation: naver.maps.Animation.DROP
  });

  /* InfoWindow */
  var iw = new naver.maps.InfoWindow({
    content: makeInfoContent(p),
    maxWidth: 300,
    backgroundColor: '#fff',
    borderColor: '#ccc',
    borderWidth: 1,
    anchorSize: new naver.maps.Size(10, 10),
    anchorColor: '#fff',
    pixelOffset: new naver.maps.Point(10, -10)
  });

  naver.maps.Event.addListener(marker, 'click', function() {
    focusPool(key);
  });

  markers[key] = marker;
  infoWindows[key] = iw;
});

function focusPool(key) {
  var p = pools[key];

  /* 버튼 active 처리 */
  document.querySelectorAll('.pool-btn').forEach(function(btn) {
    btn.classList.remove('active');
  });
  document.getElementById('btn-' + key).classList.add('active');

  /* 이전 InfoWindow 닫기 */
  if (currentKey && currentKey !== key) {
    infoWindows[currentKey].close();
  }

  /* 지도 이동 */
  map.setCenter(new naver.maps.LatLng(p.lat, p.lng));
  map.setZoom(16);

  /* InfoWindow 토글 */
  if (currentKey === key && infoWindows[key].getMap()) {
    infoWindows[key].close();
    currentKey = null;
    document.getElementById('btn-' + key).classList.remove('active');
  } else {
    infoWindows[key].open(map, markers[key]);
    currentKey = key;
  }
}

/* 인증 실패 시 안내 */
window.navermap_authFailure = function() {
  document.getElementById('map').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;color:#c00;font-size:14px;">'
    + '<strong>⚠️ 네이버 지도 API 인증 실패</strong>'
    + '<p>pool_map.html 파일을 텍스트 편집기로 열어<br>'
    + '<code>YOUR_CLIENT_KEY</code> 부분을 발급받은 <b>ncpKeyId</b>로 교체해주세요.</p>'
    + '</div>';
};
</script>
</body>
</html>
