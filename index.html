<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>네이버 지도 잠실 마커 표시하기</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=tg6az681o1"></script>
</head>
<body>

<div id="map" style="width:100%;height:600px;"></div>

<script>
    // 1. 잠실 좌표 설정 (위도: 37.5132612, 경도: 127.1001336)
    var jamsil = new naver.maps.LatLng(37.5132612, 127.1001336);

    // 2. 지도 초기화
    var map = new naver.maps.Map('map', {
        center: jamsil,
        zoom: 16
    });

    // 3. 잠실 위치에 마커(핀) 생성
    var marker = new naver.maps.Marker({
        position: jamsil,
        map: map,
        title: '서울 잠실'
    });

    // 4. (선택사항) 마커 클릭 시 설명창 띄우기
    var infowindow = new naver.maps.InfoWindow({
        content: '<div style="padding:10px; min-width:100px; text-align:center;"><b>서울 잠실</b></div>'
    });

    naver.maps.Event.addListener(marker, "click", function(e) {
        if (infowindow.getMap()) {
            infowindow.close();
        } else {
            infowindow.open(map, marker);
        }
    });

    // 페이지 로드 시 정보창 바로 열어두기
    infowindow.open(map, marker);
</script>

</body>
</html>
